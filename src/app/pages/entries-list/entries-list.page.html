<ion-header>
  <ion-toolbar color="primary">
    <ion-title>My Entries</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="signOut()">
        <ion-icon slot="icon-only" name="log-out"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-list>
      <ion-item-sliding>
        @for (entry of (entries$ | async); track entry) {
          <ion-item>
            <ion-label>{{ entry.role_id }}
              <p>{{ entry.created_at | date:'short' }}</p>
              <p>{{ entry.hours }}</p>
            </ion-label>
          </ion-item>

          <ion-item-options side="end">
            <ion-item-option (click)="delete(entry)" color="danger">
              <ion-icon name="trash" slot="icon-only"></ion-icon>
            </ion-item-option>
          </ion-item-options>
        }
        

        
      </ion-item-sliding>
    </ion-list>
  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="createEntry()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
